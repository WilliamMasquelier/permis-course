<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" role="img" aria-label="Procédure VHF MAYDAY et PAN-PAN vers le CROSS">
  <rect width="900" height="360" fill="#f8f9fc"/>
  <g font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">
    <text x="54" y="48" fill="#1a2e4a" font-size="25" font-weight="700">VHF : choisir le bon appel</text>
    <rect x="70" y="105" width="180" height="86" rx="8" fill="#1a2e4a"/>
    <text x="160" y="140" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">Canal 16</text>
    <text x="160" y="165" text-anchor="middle" fill="#cbd5e1" font-size="14">veille, appel, détresse</text>
    <path d="M255 148 L360 148" stroke="#0d7377" stroke-width="5" marker-end="url(#vhfArrow)"/>
    <rect x="375" y="80" width="190" height="72" rx="8" fill="#ef4444"/>
    <text x="470" y="110" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">MAYDAY</text>
    <text x="470" y="134" text-anchor="middle" fill="#fff" font-size="14">danger grave et imminent</text>
    <rect x="375" y="178" width="190" height="72" rx="8" fill="#f5a623"/>
    <text x="470" y="208" text-anchor="middle" fill="#1a2e4a" font-size="18" font-weight="700">PAN-PAN</text>
    <text x="470" y="232" text-anchor="middle" fill="#1a2e4a" font-size="14">urgence sans péril vital</text>
    <path d="M570 116 L690 150" stroke="#0d7377" stroke-width="5" marker-end="url(#vhfArrow)"/>
    <path d="M570 214 L690 174" stroke="#0d7377" stroke-width="5" marker-end="url(#vhfArrow)"/>
    <rect x="700" y="118" width="145" height="82" rx="8" fill="#0d7377"/>
    <text x="772" y="150" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">CROSS</text>
    <text x="772" y="174" text-anchor="middle" fill="#e0ffff" font-size="14">coordonne les secours</text>
    <text x="90" y="292" fill="#1a2e4a" font-size="16">ASN canal 70 : bouton détresse avec MMSI + position si GPS couplé.</text>
  </g>
  <defs>
    <marker id="vhfArrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 Z" fill="#0d7377"/></marker>
  </defs>
</svg>
