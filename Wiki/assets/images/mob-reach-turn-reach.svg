<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="Manœuvre Homme à la mer — Reach-Turn-Reach">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 Z" fill="#0d7377"/></marker>
    <marker id="arrRed" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 Z" fill="#ef4444"/></marker>
    <marker id="arrGray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 Z" fill="#888"/></marker>
  </defs>
  <rect width="800" height="500" fill="#d4ecf7"/>
  <g font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">
    <!-- Title -->
    <text x="400" y="35" text-anchor="middle" fill="#1a2e4a" font-size="22" font-weight="700">Manœuvre HAM — Reach-Turn-Reach (voile)</text>

    <!-- Wind arrow -->
    <text x="680" y="80" fill="#1a2e4a" font-size="14" font-weight="700">Vent</text>
    <path d="M720 90 L720 160" stroke="#1a2e4a" stroke-width="3" marker-end="url(#arrGray)"/>
    <text x="726" y="130" fill="#888" font-size="12">↓</text>

    <!-- MOB position -->
    <circle cx="400" cy="250" r="14" fill="#ef4444" stroke="#fff" stroke-width="2"/>
    <text x="420" y="255" fill="#ef4444" font-size="14" font-weight="700">HAM</text>

    <!-- Step 1: beam reach away -->
    <!-- Boat starts near MOB position, goes to beam reach -->
    <circle cx="400" cy="250" r="7" fill="#1a2e4a"/>
    <text x="290" y="244" fill="#1a2e4a" font-size="12">① Chute à l'eau</text>

    <!-- Path: beam reach port (go left) -->
    <path d="M400 250 L180 250" stroke="#0d7377" stroke-width="3" stroke-dasharray="8 4" marker-end="url(#arr)"/>
    <text x="230" y="240" fill="#0d7377" font-size="12" font-weight="700">① Travers</text>

    <!-- Turn -->
    <path d="M180 250 Q150 160 220 100" stroke="#0d7377" stroke-width="3" stroke-dasharray="8 4" marker-end="url(#arr)"/>
    <text x="130" y="170" fill="#0d7377" font-size="12" font-weight="700">② Virement</text>

    <!-- Return on close reach -->
    <path d="M220 100 L400 250" stroke="#0d7377" stroke-width="4" marker-end="url(#arr)"/>
    <text x="270" y="150" fill="#0d7377" font-size="13" font-weight="700">③ Près abattu</text>
    <text x="260" y="167" fill="#0d7377" font-size="11">(contrôle vitesse)</text>

    <!-- Boat symbol at final approach -->
    <polygon points="400,250 388,268 412,268" fill="#1a2e4a" transform="rotate(-45, 400, 250)"/>

    <!-- Labels for approach -->
    <text x="380" y="310" fill="#1a2e4a" font-size="13">Arrêt sous le vent</text>
    <text x="375" y="327" fill="#1a2e4a" font-size="11">du naufragé</text>

    <!-- Sequence labels -->
    <rect x="500" y="80" width="260" height="200" rx="8" fill="rgba(255,255,255,0.8)" stroke="#1a2e4a" stroke-width="1"/>
    <text x="630" y="104" text-anchor="middle" fill="#1a2e4a" font-size="14" font-weight="700">Séquence</text>
    <text x="515" y="128" fill="#1a2e4a" font-size="12">① Jeter bouée + désigner veilleur</text>
    <text x="515" y="150" fill="#1a2e4a" font-size="12">② S'éloigner au travers</text>
    <text x="515" y="172" fill="#1a2e4a" font-size="12">③ Virer de bord</text>
    <text x="515" y="194" fill="#1a2e4a" font-size="12">④ Revenir au près abattu</text>
    <text x="515" y="216" fill="#1a2e4a" font-size="12">⑤ Choquer les voiles → arrêt</text>
    <text x="515" y="238" fill="#1a2e4a" font-size="12">⑥ Stopper sous le vent du HAM</text>
    <text x="515" y="260" fill="#0d7377" font-size="11" font-style="italic">Idéal : voilier expert, sans moteur</text>

    <!-- Note on avoidance of propeller -->
    <rect x="500" y="310" width="260" height="60" rx="8" fill="rgba(239,68,68,0.1)" stroke="#ef4444" stroke-width="1"/>
    <text x="515" y="335" fill="#ef4444" font-size="12" font-weight="700">⚠ Couper le moteur</text>
    <text x="515" y="355" fill="#1a2e4a" font-size="11">avant d'approcher le naufragé</text>

    <!-- Footer -->
    <text x="400" y="490" text-anchor="middle" fill="#888" font-size="10">Source: Complete Yachtmaster ch.31 — raw/books/complete-yachtmaster-cunliffe.pdf</text>
  </g>
</svg>
