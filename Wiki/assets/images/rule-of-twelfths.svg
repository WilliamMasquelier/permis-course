<?xml version="1.0" encoding="utf-8"?>
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="100%" height="100%" viewBox="-820 -770 2750 1500">
 <title>Rule of twelfths</title>
 <desc>Graph showing relationships between the rule of twelfths (coloured bars), a sine wave (dashed blue curve) and a clockface, by CMG Lee, if high tide occurs at 12:00.</desc>
 <defs>
  <pattern id="pattern_wave" patternUnits="userSpaceOnUse" width="80" height="20">
   <path transform="scale(4,2)" d="M -1,1 h 1 c 3.65,1 6.35,8 10,8 s 6.35,-8 10,-8 h 1" fill="none" stroke="#0099ff"/>
  </pattern>
  <pattern id="pattern_grid" patternUnits="userSpaceOnUse" width="100" height="100">
   <rect x="0" y="0" width="100" height="100" fill="none" stroke="#000000"/>
  </pattern>
  <g id="half_graph" transform="translate(-600,0)" stroke="#000000">
   <path d="M 600,600       h -100 v -100 z m -500,-1100 v 1100 h -100 v -1200 z" fill="#00ff00"/>
   <path d="M 500,500 v 100 h -100 v -300 z m -300, -800 v  900 h -100 v -1100 z" fill="#ffcc00"/>
   <path d="M 400,300 v 300 h -100 v -600 z m -100, -300 v  600 h -100 v  -900 z" fill="#ff9999"/>
   <path transform="scale(6)" d="M 0,-100 c 36.5,0 63.5,200 100,200" stroke="#0000ff" stroke-width="2" stroke-dasharray="4,4"/>
  </g>
 </defs>
 <circle cx="0" cy="0" r="99999" fill="#ffffff"/>
 <g font-family="Helvetica,Arial,sans-serif" font-size="72" text-anchor="middle"
    fill="none" stroke="none" stroke-width="4" stroke-linejoin="round">
  <path d="M 200,-340 a 120,120 0 0 0 160,0 z m 80,-100 a 120,120 0 0 1 0,100 a 120,120 0 0 1 70,0 z m 0,-30 v 125 h -60 z" fill="#ff66ff"/>
  <rect x="-600" y="-320" width="1200" height="920" fill="url(#pattern_wave)"/>
  <use xlink:href="#half_graph" fill-opacity="0.5"/>
  <use xlink:href="#half_graph" transform="scale(-1,1)"/>
  <rect x="-600" y="-600" width="1200" height="1200" fill="url(#pattern_grid)"/>
  <g transform="translate(0,-700)" fill="#000000">
   <text transform="translate(-550,0)" x="0" y="0"><tspan>&#8722;1</tspan      ><tspan x="0">__</tspan><tspan x="0" dy="1em">12</tspan></text>
   <text transform="translate(-450,0)" x="0" y="0"><tspan>&#8722;2</tspan      ><tspan x="0">__</tspan><tspan x="0" dy="1em">12</tspan></text>
   <text transform="translate(-350,0)" x="0" y="0"><tspan>&#8722;3</tspan      ><tspan x="0">__</tspan><tspan x="0" dy="1em">12</tspan></text>
   <text transform="translate(-250,0)" x="0" y="0"><tspan>&#8722;3</tspan      ><tspan x="0">__</tspan><tspan x="0" dy="1em">12</tspan></text>
   <text transform="translate(-150,0)" x="0" y="0"><tspan>&#8722;2</tspan      ><tspan x="0">__</tspan><tspan x="0" dy="1em">12</tspan></text>
   <text transform="translate( -50,0)" x="0" y="0"><tspan>&#8722;1</tspan      ><tspan x="0">__</tspan><tspan x="0" dy="1em">12</tspan></text>
   <text transform="translate(  50,0)" x="0" y="0"><tspan>+1</tspan><tspan x="0">__</tspan><tspan x="0" dy="1em">12</tspan></text>
   <text transform="translate( 150,0)" x="0" y="0"><tspan>+2</tspan><tspan x="0">__</tspan><tspan x="0" dy="1em">12</tspan></text>
   <text transform="translate( 250,0)" x="0" y="0"><tspan>+3</tspan><tspan x="0">__</tspan><tspan x="0" dy="1em">12</tspan></text>
   <text transform="translate( 350,0)" x="0" y="0"><tspan>+3</tspan><tspan x="0">__</tspan><tspan x="0" dy="1em">12</tspan></text>
   <text transform="translate( 450,0)" x="0" y="0"><tspan>+2</tspan><tspan x="0">__</tspan><tspan x="0" dy="1em">12</tspan></text>
   <text transform="translate( 550,0)" x="0" y="0"><tspan>+1</tspan><tspan x="0">__</tspan><tspan x="0" dy="1em">12</tspan></text>
  </g>
  <g transform="translate(0,670)" fill="#000000">
   <text x="-600" y="0.7ex">0</text>
   <text x="-500" y="0.7ex">1</text>
   <text x="-400" y="0.7ex">2</text>
   <text x="-300" y="0.7ex">3</text>
   <text x="-200" y="0.7ex">4</text>
   <text x="-100" y="0.7ex">5</text>
   <text x="0"    y="0.7ex">6</text>
   <text x="100"  y="0.7ex">7</text>
   <text x="200"  y="0.7ex">8</text>
   <text x="297"  y="0.7ex">9</text>
   <text x="395"  y="0.7ex">10</text>
   <text x="495"  y="0.7ex">11</text>
   <text x="605"  y="0.7ex">12h</text>
  </g>
  <g transform="translate(-620,0)" text-anchor="end" fill="#000000">
   <text x="0" y="-600" dy="0.7ex">1</text>
   <text x="0" y="-500" dy="0.7ex">11/12</text>
   <text x="0" y="-400" dy="0.7ex">10/12</text>
   <text x="0" y="-300" dy="0.7ex">9/12</text>
   <text x="0" y="-200" dy="0.7ex">8/12</text>
   <text x="0" y="-100" dy="0.7ex">7/12</text>
   <text x="0" y="0"    dy="0.7ex">6/12</text>
   <text x="0" y="100"  dy="0.7ex">5/12</text>
   <text x="0" y="200"  dy="0.7ex">4/12</text>
   <text x="0" y="300"  dy="0.7ex">3/12</text>
   <text x="0" y="400"  dy="0.7ex">2/12</text>
   <text x="0" y="500"  dy="0.7ex">1/12</text>
   <text x="0" y="600"  dy="0.7ex">0</text>
  </g>
  <g transform="translate(1260,0)" stroke-linecap="round">
   <circle transform="rotate(12)" cx="0" cy="0" r="600" stroke="#ffccff" stroke-width="20" stroke-dasharray="110,200"/>
   <path d="M 400,-240 L 0,0 L -300,-180" stroke="#ffccff" stroke-width="40"/>
   <path d="M   0,-600 H -1850
            M 300,-500 H -1750
            M 500,-300 H -1650
            M 600,   0 H -1550
            M 500, 300 H -1450
            M 300, 500 H -1350
            M   0, 600 H -1250" stroke="#ff00ff"/>
   <!-- <path d="M -550,-310 H  -850 m 40,-20 l -40,20 l 40,20" stroke="#660066" stroke-width="10"/> -->
   <g font-size="96" fill="#ff66ff">
    <!-- <text x="-965" y="-400" dy="0.7ex" font-size="192">&#9973;</text> -->
    <text x="300"  y="-500" dy="0.7ex">1</text>
    <text x="500"  y="-300" dy="0.7ex">2</text>
    <text x="600"  y="0"    dy="0.7ex">3</text>
    <text x="500"  y="300"  dy="0.7ex">4</text>
    <text x="300"  y="500"  dy="0.7ex">5</text>
    <text x="0"    y="600"  dy="0.7ex">6</text>
    <text x="-300" y="500"  dy="0.7ex">7</text>
    <text x="-500" y="300"  dy="0.7ex">8</text>
    <text x="-600" y="0"    dy="0.7ex">9</text>
    <text x="-500" y="-300" dy="0.7ex">10</text>
    <text x="-300" y="-500" dy="0.7ex">11</text>
    <text x="0"    y="-600" dy="0.7ex">12</text>
   </g>
  </g>
 </g>
</svg>
