<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" role="img" aria-label="Courbe de marée type avec niveaux MHWS MHWN MLWN MLWS">
  <rect width="800" height="460" fill="#eef6fb"/>
  <g font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">
    <!-- Title -->
    <text x="400" y="35" text-anchor="middle" fill="#1a2e4a" font-size="22" font-weight="700">Courbe de marée type — Niveaux caractéristiques</text>

    <!-- Axes -->
    <line x1="80" y1="60" x2="80" y2="390" stroke="#1a2e4a" stroke-width="2"/>
    <line x1="80" y1="390" x2="740" y2="390" stroke="#1a2e4a" stroke-width="2"/>
    <text x="45" y="230" fill="#1a2e4a" font-size="13" transform="rotate(-90,45,230)" text-anchor="middle">Hauteur d'eau</text>
    <text x="400" y="425" fill="#1a2e4a" font-size="13" text-anchor="middle">Temps (heures)</text>

    <!-- Time axis labels (0 to 12h) -->
    <text x="80"  y="408" text-anchor="middle" fill="#888" font-size="11">0h</text>
    <text x="190" y="408" text-anchor="middle" fill="#888" font-size="11">2h</text>
    <text x="300" y="408" text-anchor="middle" fill="#888" font-size="11">4h</text>
    <text x="410" y="408" text-anchor="middle" fill="#888" font-size="11">6h</text>
    <text x="520" y="408" text-anchor="middle" fill="#888" font-size="11">8h</text>
    <text x="630" y="408" text-anchor="middle" fill="#888" font-size="11">10h</text>
    <text x="740" y="408" text-anchor="middle" fill="#888" font-size="11">12h</text>

    <!-- Tidal curve (sinusoidal-ish) — PM at ~410, BM at ~540, two cycles shown -->
    <!-- Simplified: curve from BM to PM to BM, heights in pixels:
         BM vive-eau: y=340, PM vive-eau: y=80
         BM morte-eau: y=260, PM morte-eau: y=165 -->

    <!-- Spring tide curve (vive-eau) — dark blue -->
    <path d="M80 340 C135 340 155 80 300 80 C445 80 465 340 520 340 C575 340 595 80 740 80"
          fill="none" stroke="#0d7377" stroke-width="3"/>

    <!-- Neap tide curve (morte-eau) — light blue dashed -->
    <path d="M80 260 C135 260 155 165 300 165 C445 165 465 260 520 260 C575 260 595 165 740 165"
          fill="none" stroke="#2196f3" stroke-width="2.5" stroke-dasharray="10 5"/>

    <!-- MHWS line -->
    <line x1="80" y1="80" x2="740" y2="80" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="6 4"/>
    <text x="748" y="84" fill="#ef4444" font-size="12" font-weight="700">MHWS</text>

    <!-- MHWN line -->
    <line x1="80" y1="165" x2="740" y2="165" stroke="#f5a623" stroke-width="1.5" stroke-dasharray="6 4"/>
    <text x="748" y="169" fill="#f5a623" font-size="12" font-weight="700">MHWN</text>

    <!-- MLWN line -->
    <line x1="80" y1="260" x2="740" y2="260" stroke="#f5a623" stroke-width="1.5" stroke-dasharray="6 4"/>
    <text x="748" y="264" fill="#f5a623" font-size="12" font-weight="700">MLWN</text>

    <!-- MLWS line -->
    <line x1="80" y1="340" x2="740" y2="340" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="6 4"/>
    <text x="748" y="344" fill="#ef4444" font-size="12" font-weight="700">MLWS</text>

    <!-- Chart datum line -->
    <line x1="80" y1="375" x2="740" y2="375" stroke="#888" stroke-width="1" stroke-dasharray="4 4"/>
    <text x="748" y="378" fill="#888" font-size="11">CD</text>

    <!-- Marnage vive-eau bracket -->
    <line x1="60" y1="80" x2="60" y2="340" stroke="#ef4444" stroke-width="1.5"/>
    <line x1="55" y1="80" x2="65" y2="80" stroke="#ef4444" stroke-width="1.5"/>
    <line x1="55" y1="340" x2="65" y2="340" stroke="#ef4444" stroke-width="1.5"/>
    <text x="58" y="215" fill="#ef4444" font-size="11" text-anchor="middle" transform="rotate(-90,58,215)">Marnage vive-eau</text>

    <!-- Labels -->
    <rect x="480" y="280" width="230" height="95" rx="6" fill="rgba(255,255,255,0.85)" stroke="#1a2e4a" stroke-width="1"/>
    <text x="595" y="298" text-anchor="middle" fill="#1a2e4a" font-size="12" font-weight="700">Légende</text>
    <line x1="490" y1="310" x2="520" y2="310" stroke="#0d7377" stroke-width="2.5"/>
    <text x="528" y="314" fill="#1a2e4a" font-size="11">Vive-eau (syzygie)</text>
    <line x1="490" y1="328" x2="520" y2="328" stroke="#2196f3" stroke-width="2.5" stroke-dasharray="8 4"/>
    <text x="528" y="332" fill="#1a2e4a" font-size="11">Morte-eau (quadrature)</text>
    <text x="490" y="352" fill="#888" font-size="10">PM = Pleine Mer   BM = Basse Mer</text>
    <text x="490" y="365" fill="#888" font-size="10">S = Spring   N = Neap   W = Waters</text>

    <!-- Footer -->
    <text x="400" y="448" text-anchor="middle" fill="#888" font-size="10">Source: Complete Yachtmaster ch.14 — raw/books/yachtmaster-chapters/ch14-tidal-heights.txt</text>
  </g>
</svg>
