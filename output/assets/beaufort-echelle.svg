<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 580" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="860" height="580" fill="#f0f7ff"/>
  <text x="430" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#1a2e4a">Échelle de Beaufort — État de la Mer</text>

  <!-- Column headers -->
  <rect x="20" y="48" width="820" height="28" rx="6" fill="#1a2e4a"/>
  <text x="50"  y="67" font-size="12" font-weight="700" fill="#fff">Force</text>
  <text x="105" y="67" font-size="12" font-weight="700" fill="#fff">Vent (nœuds)</text>
  <text x="225" y="67" font-size="12" font-weight="700" fill="#fff">Désignation</text>
  <text x="355" y="67" font-size="12" font-weight="700" fill="#fff">État de la mer</text>
  <text x="620" y="67" font-size="12" font-weight="700" fill="#fff">Hauteur vagues</text>
  <text x="740" y="67" font-size="12" font-weight="700" fill="#fff">Navigation</text>

  <!-- Color scale function -->
  <!-- Colors: 0-2 green, 3-4 teal, 5-6 amber, 7-8 orange, 9-11 red, 12 dark red -->

  <!-- Rows -->
  <!-- Force 0 -->
  <rect x="20" y="78" width="820" height="32" fill="rgba(5,150,105,0.1)"/>
  <text x="50"  y="99" font-size="13" font-weight="700" fill="#059669">0</text>
  <text x="105" y="99" font-size="12" fill="#18202e">&lt; 1</text>
  <text x="225" y="99" font-size="12" fill="#18202e">Calme</text>
  <text x="355" y="99" font-size="12" fill="#18202e">Mer d'huile, miroir</text>
  <text x="620" y="99" font-size="12" fill="#18202e">0 m</text>
  <text x="740" y="99" font-size="12" fill="#059669">Idéal</text>

  <!-- Force 1 -->
  <rect x="20" y="112" width="820" height="32" fill="rgba(5,150,105,0.05)"/>
  <text x="50"  y="133" font-size="13" font-weight="700" fill="#059669">1</text>
  <text x="105" y="133" font-size="12" fill="#18202e">1–3</text>
  <text x="225" y="133" font-size="12" fill="#18202e">Très légère brise</text>
  <text x="355" y="133" font-size="12" fill="#18202e">Rides sans écume</text>
  <text x="620" y="133" font-size="12" fill="#18202e">0,1 m</text>
  <text x="740" y="133" font-size="12" fill="#059669">Idéal</text>

  <!-- Force 2 -->
  <rect x="20" y="146" width="820" height="32" fill="rgba(5,150,105,0.1)"/>
  <text x="50"  y="167" font-size="13" font-weight="700" fill="#059669">2</text>
  <text x="105" y="167" font-size="12" fill="#18202e">4–6</text>
  <text x="225" y="167" font-size="12" fill="#18202e">Légère brise</text>
  <text x="355" y="167" font-size="12" fill="#18202e">Vaguelettes, pas de crête</text>
  <text x="620" y="167" font-size="12" fill="#18202e">0,2 m</text>
  <text x="740" y="167" font-size="12" fill="#059669">Très bon</text>

  <!-- Force 3 -->
  <rect x="20" y="180" width="820" height="32" fill="rgba(13,115,119,0.08)"/>
  <text x="50"  y="201" font-size="13" font-weight="700" fill="#0d7377">3</text>
  <text x="105" y="201" font-size="12" fill="#18202e">7–10</text>
  <text x="225" y="201" font-size="12" fill="#18202e">Petite brise</text>
  <text x="355" y="201" font-size="12" fill="#18202e">Moutons apparaissent</text>
  <text x="620" y="201" font-size="12" fill="#18202e">0,6 m</text>
  <text x="740" y="201" font-size="12" fill="#0d7377">Bon</text>

  <!-- Force 4 -->
  <rect x="20" y="214" width="820" height="32" fill="rgba(13,115,119,0.04)"/>
  <text x="50"  y="235" font-size="13" font-weight="700" fill="#0d7377">4</text>
  <text x="105" y="235" font-size="12" fill="#18202e">11–16</text>
  <text x="225" y="235" font-size="12" fill="#18202e">Jolie brise</text>
  <text x="355" y="235" font-size="12" fill="#18202e">Vagues courtes, moutons fréquents</text>
  <text x="620" y="235" font-size="12" fill="#18202e">1,0 m</text>
  <text x="740" y="235" font-size="12" fill="#0d7377">Acceptable</text>

  <!-- Force 5 -->
  <rect x="20" y="248" width="820" height="32" fill="rgba(245,166,35,0.1)"/>
  <text x="50"  y="269" font-size="13" font-weight="700" fill="#b07a10">5</text>
  <text x="105" y="269" font-size="12" fill="#18202e">17–21</text>
  <text x="225" y="269" font-size="12" fill="#18202e">Bonne brise</text>
  <text x="355" y="269" font-size="12" fill="#18202e">Vagues modérées, embruns</text>
  <text x="620" y="269" font-size="12" fill="#18202e">2,0 m</text>
  <text x="740" y="269" font-size="12" fill="#b07a10">Prudence</text>

  <!-- Force 6 -->
  <rect x="20" y="282" width="820" height="32" fill="rgba(245,166,35,0.15)"/>
  <text x="50"  y="303" font-size="13" font-weight="700" fill="#b07a10">6</text>
  <text x="105" y="303" font-size="12" fill="#18202e">22–27</text>
  <text x="225" y="303" font-size="12" fill="#18202e">Vent frais</text>
  <text x="355" y="303" font-size="12" fill="#18202e">Lames, crêtes blanches partout</text>
  <text x="620" y="303" font-size="12" fill="#18202e">3,0 m</text>
  <text x="740" y="303" font-size="12" fill="#b07a10">⚠ Limite débutants</text>

  <!-- Force 7 -->
  <rect x="20" y="316" width="820" height="32" fill="rgba(220,38,38,0.08)"/>
  <text x="50"  y="337" font-size="13" font-weight="700" fill="#dc2626">7</text>
  <text x="105" y="337" font-size="12" fill="#18202e">28–33</text>
  <text x="225" y="337" font-size="12" fill="#18202e">Grand frais</text>
  <text x="355" y="337" font-size="12" fill="#18202e">Lames déferlantes, embruns</text>
  <text x="620" y="337" font-size="12" fill="#18202e">4,0 m</text>
  <text x="740" y="337" font-size="12" fill="#dc2626">⚠ Dangereux</text>

  <!-- Force 8 -->
  <rect x="20" y="350" width="820" height="32" fill="rgba(220,38,38,0.12)"/>
  <text x="50"  y="371" font-size="13" font-weight="700" fill="#dc2626">8</text>
  <text x="105" y="371" font-size="12" fill="#18202e">34–40</text>
  <text x="225" y="371" font-size="12" fill="#18202e">Coup de vent</text>
  <text x="355" y="371" font-size="12" fill="#18202e">Tourbillons d'embruns, visibilité réduite</text>
  <text x="620" y="371" font-size="12" fill="#18202e">5,5 m</text>
  <text x="740" y="371" font-size="12" fill="#dc2626">⛔ Rentrer au port</text>

  <!-- Force 9 -->
  <rect x="20" y="384" width="820" height="32" fill="rgba(220,38,38,0.08)"/>
  <text x="50"  y="405" font-size="13" font-weight="700" fill="#dc2626">9</text>
  <text x="105" y="405" font-size="12" fill="#18202e">41–47</text>
  <text x="225" y="405" font-size="12" fill="#18202e">Fort coup de vent</text>
  <text x="355" y="405" font-size="12" fill="#18202e">Lames très hautes, crêtes renversées</text>
  <text x="620" y="405" font-size="12" fill="#18202e">7,0 m</text>
  <text x="740" y="405" font-size="12" fill="#dc2626">⛔ Danger grave</text>

  <!-- Force 10 -->
  <rect x="20" y="418" width="820" height="32" fill="rgba(220,38,38,0.12)"/>
  <text x="50"  y="439" font-size="13" font-weight="700" fill="#7c0000">10</text>
  <text x="105" y="439" font-size="12" fill="#18202e">48–55</text>
  <text x="225" y="439" font-size="12" fill="#18202e">Tempête</text>
  <text x="355" y="439" font-size="12" fill="#18202e">Mer très haute, surface blanche</text>
  <text x="620" y="439" font-size="12" fill="#18202e">9,0 m</text>
  <text x="740" y="439" font-size="12" fill="#7c0000">⛔⛔</text>

  <!-- Force 11 -->
  <rect x="20" y="452" width="820" height="32" fill="rgba(220,38,38,0.16)"/>
  <text x="50"  y="473" font-size="13" font-weight="700" fill="#7c0000">11</text>
  <text x="105" y="473" font-size="12" fill="#18202e">56–63</text>
  <text x="225" y="473" font-size="12" fill="#18202e">Violente tempête</text>
  <text x="355" y="473" font-size="12" fill="#18202e">Mer exceptionnellement agitée</text>
  <text x="620" y="473" font-size="12" fill="#18202e">11,5 m</text>
  <text x="740" y="473" font-size="12" fill="#7c0000">⛔⛔⛔</text>

  <!-- Force 12 -->
  <rect x="20" y="486" width="820" height="32" rx="0" fill="rgba(124,0,0,0.2)"/>
  <text x="50"  y="507" font-size="13" font-weight="700" fill="#7c0000">12</text>
  <text x="105" y="507" font-size="12" fill="#18202e">≥ 64</text>
  <text x="225" y="507" font-size="12" fill="#7c0000" font-weight="700">Ouragan</text>
  <text x="355" y="507" font-size="12" fill="#18202e">Mer apocalyptique, air plein d'embruns</text>
  <text x="620" y="507" font-size="12" fill="#18202e">≥ 14 m</text>
  <text x="740" y="507" font-size="12" fill="#7c0000">Catastrophe</text>

  <!-- Divider line between rows -->
  <line x1="20" y1="110" x2="840" y2="110" stroke="#e2e8f0" stroke-width="0.5"/>
  <line x1="20" y1="144" x2="840" y2="144" stroke="#e2e8f0" stroke-width="0.5"/>
  <line x1="20" y1="178" x2="840" y2="178" stroke="#e2e8f0" stroke-width="0.5"/>
  <line x1="20" y1="212" x2="840" y2="212" stroke="#e2e8f0" stroke-width="0.5"/>
  <line x1="20" y1="246" x2="840" y2="246" stroke="#e2e8f0" stroke-width="0.5"/>
  <line x1="20" y1="280" x2="840" y2="280" stroke="#e2e8f0" stroke-width="0.5"/>
  <line x1="20" y1="314" x2="840" y2="314" stroke="#e2e8f0" stroke-width="0.5"/>
  <line x1="20" y1="348" x2="840" y2="348" stroke="#e2e8f0" stroke-width="0.5"/>
  <line x1="20" y1="382" x2="840" y2="382" stroke="#e2e8f0" stroke-width="0.5"/>
  <line x1="20" y1="416" x2="840" y2="416" stroke="#e2e8f0" stroke-width="0.5"/>
  <line x1="20" y1="450" x2="840" y2="450" stroke="#e2e8f0" stroke-width="0.5"/>
  <line x1="20" y1="484" x2="840" y2="484" stroke="#e2e8f0" stroke-width="0.5"/>

  <!-- Column separators -->
  <line x1="90" y1="48" x2="90" y2="518" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="210" y1="48" x2="210" y2="518" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="345" y1="48" x2="345" y2="518" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="610" y1="48" x2="610" y2="518" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="730" y1="48" x2="730" y2="518" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Bottom border -->
  <rect x="20" y="48" width="820" height="470" rx="6" fill="none" stroke="#1a2e4a" stroke-width="1.5"/>

  <!-- Footer notes -->
  <text x="430" y="545" text-anchor="middle" font-size="11" fill="#64748b">Golfe de Fethiye (été) : F3–F4 le matin, F4–F5 l'après-midi (Imbat). BMS émis dès F7 prévu.</text>
  <text x="430" y="562" text-anchor="middle" font-size="11" fill="#64748b">Limite recommandée débutants : F4 max · Permis côtier formation : sortir avec F2–F3</text>
</svg>
