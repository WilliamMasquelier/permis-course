<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="900" height="620" fill="#f0f7ff"/>
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#1a2e4a">Vocabulaire du Voilier — Parties Principales</text>

  <!-- === SAILBOAT DRAWING (side profile, sloop rig) === -->
  <!-- Scale: centered around x=430, waterline at y=430 -->

  <!-- SEA -->
  <rect x="0" y="430" width="900" height="190" fill="rgba(13,115,119,0.08)" rx="0"/>
  <line x1="0" y1="430" x2="900" y2="430" stroke="#0d7377" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.5"/>

  <!-- HULL -->
  <path d="M 240,390 Q 270,420 320,430 L 550,430 Q 580,428 600,415 L 590,395 Q 560,385 430,382 Z"
        fill="#1a2e4a" stroke="#0e1e30" stroke-width="2"/>

  <!-- KEEL -->
  <path d="M 370,430 L 355,490 L 420,490 L 430,430 Z" fill="#0e1e30" stroke="#0e1e30" stroke-width="1"/>

  <!-- RUDDER -->
  <path d="M 545,428 L 540,480 L 560,480 L 558,428 Z" fill="#0e1e30" stroke="#0e1e30" stroke-width="1"/>

  <!-- DECK LINE -->
  <line x1="245" y1="392" x2="590" y2="392" stroke="#c8d8e8" stroke-width="2"/>

  <!-- COCKPIT depression -->
  <path d="M 480,392 Q 485,405 510,408 Q 540,410 555,405 L 558,392 Z" fill="#14a0a5" opacity="0.3" stroke="#0d7377" stroke-width="1"/>

  <!-- MAST -->
  <line x1="380" y1="392" x2="380" y2="80" stroke="#64748b" stroke-width="5" stroke-linecap="round"/>

  <!-- BOOM -->
  <line x1="380" y1="310" x2="555" y2="340" stroke="#64748b" stroke-width="4" stroke-linecap="round"/>

  <!-- MAINSAIL (grand-voile) -->
  <path d="M 380,95 L 380,310 L 555,338 Z" fill="rgba(245,166,35,0.6)" stroke="#f5a623" stroke-width="1.5"/>

  <!-- JIB/GENOA (foc/génois) -->
  <path d="M 375,130 L 240,392 L 375,392 Z" fill="rgba(20,160,165,0.5)" stroke="#14a0a5" stroke-width="1.5"/>

  <!-- FORESTAY -->
  <line x1="380" y1="105" x2="240" y2="392" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- SHROUDS (haubans) -->
  <line x1="380" y1="150" x2="320" y2="392" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="380" y1="150" x2="480" y2="392" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- BACKSTAY -->
  <line x1="380" y1="105" x2="580" y2="392" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- SPREADERS -->
  <line x1="338" y1="232" x2="422" y2="232" stroke="#64748b" stroke-width="3" stroke-linecap="round"/>

  <!-- MASTHEAD FLY / light -->
  <circle cx="380" cy="82" r="5" fill="#f5a623" stroke="#e8960a" stroke-width="1"/>

  <!-- ===== LABELS WITH LINES ===== -->
  <!-- Helper: label box with connecting line -->
  <!-- LEFT SIDE labels -->

  <!-- Étrave (bow) -->
  <line x1="243" y1="392" x2="140" y2="350" stroke="#1a2e4a" stroke-width="1" opacity="0.6"/>
  <text x="135" y="346" text-anchor="end" font-size="12" font-weight="700" fill="#1a2e4a">Étrave (proue)</text>
  <text x="135" y="360" text-anchor="end" font-size="10" fill="#0d7377">extrémité avant</text>

  <!-- Foc/Génois -->
  <line x1="308" y1="300" x2="120" y2="270" stroke="#14a0a5" stroke-width="1" opacity="0.6"/>
  <text x="115" y="266" text-anchor="end" font-size="12" font-weight="700" fill="#1a2e4a">Génois (foc)</text>
  <text x="115" y="280" text-anchor="end" font-size="10" fill="#0d7377">voile avant</text>

  <!-- Étai avant (forestay) -->
  <line x1="320" y1="240" x2="170" y2="210" stroke="#94a3b8" stroke-width="1" opacity="0.8"/>
  <text x="165" y="206" text-anchor="end" font-size="12" font-weight="700" fill="#1a2e4a">Étai avant</text>
  <text x="165" y="220" text-anchor="end" font-size="10" fill="#0d7377">(forestay)</text>

  <!-- Hauban -->
  <line x1="355" y1="232" x2="200" y2="190" stroke="#94a3b8" stroke-width="1" opacity="0.8"/>
  <text x="195" y="186" text-anchor="end" font-size="12" font-weight="700" fill="#1a2e4a">Hauban</text>
  <text x="195" y="200" text-anchor="end" font-size="10" fill="#0d7377">+ barre de flèche</text>

  <!-- Mât -->
  <line x1="380" y1="200" x2="210" y2="160" stroke="#64748b" stroke-width="1" opacity="0.7"/>
  <text x="205" y="156" text-anchor="end" font-size="12" font-weight="700" fill="#1a2e4a">Mât</text>
  <text x="205" y="170" text-anchor="end" font-size="10" fill="#0d7377">grand mât</text>

  <!-- Quille -->
  <line x1="393" y1="490" x2="220" y2="510" stroke="#0e1e30" stroke-width="1" opacity="0.6"/>
  <text x="215" y="506" text-anchor="end" font-size="12" font-weight="700" fill="#1a2e4a">Quille</text>
  <text x="215" y="520" text-anchor="end" font-size="10" fill="#0d7377">stabilité + antidrif</text>

  <!-- Bâbord label -->
  <rect x="10" y="400" width="70" height="24" rx="4" fill="rgba(220,38,38,0.15)" stroke="#dc2626" stroke-width="1"/>
  <text x="45" y="416" text-anchor="middle" font-size="12" font-weight="700" fill="#dc2626">BÂBORD</text>
  <text x="45" y="434" text-anchor="middle" font-size="10" fill="#dc2626">côté gauche (rouge)</text>

  <!-- RIGHT SIDE labels -->

  <!-- Sommet de mât -->
  <line x1="382" y1="84" x2="550" y2="60" stroke="#f5a623" stroke-width="1" opacity="0.8"/>
  <text x="555" y="56" font-size="12" font-weight="700" fill="#1a2e4a">Tête de mât</text>
  <text x="555" y="70" font-size="10" fill="#0d7377">+ feu de tête de mât</text>

  <!-- Grand-voile -->
  <line x1="450" y1="220" x2="640" y2="200" stroke="#f5a623" stroke-width="1" opacity="0.8"/>
  <text x="645" y="196" font-size="12" font-weight="700" fill="#1a2e4a">Grand-voile</text>
  <text x="645" y="210" font-size="10" fill="#0d7377">voile principale</text>

  <!-- Bôme -->
  <line x1="470" y1="335" x2="640" y2="320" stroke="#64748b" stroke-width="1" opacity="0.8"/>
  <text x="645" y="316" font-size="12" font-weight="700" fill="#1a2e4a">Bôme</text>
  <text x="645" y="330" font-size="10" fill="#dc2626">attention à la tête !</text>

  <!-- Cockpit -->
  <line x1="515" y1="405" x2="640" y2="380" stroke="#0d7377" stroke-width="1" opacity="0.7"/>
  <text x="645" y="376" font-size="12" font-weight="700" fill="#1a2e4a">Cockpit</text>
  <text x="645" y="390" font-size="10" fill="#0d7377">poste de barre + écoutes</text>

  <!-- Tableau arrière (stern) -->
  <line x1="592" y1="415" x2="720" y2="395" stroke="#1a2e4a" stroke-width="1" opacity="0.6"/>
  <text x="725" y="391" font-size="12" font-weight="700" fill="#1a2e4a">Tableau arrière</text>
  <text x="725" y="405" font-size="10" fill="#0d7377">(poupe)</text>

  <!-- Safran/gouvernail -->
  <line x1="552" y1="468" x2="720" y2="460" stroke="#0e1e30" stroke-width="1" opacity="0.6"/>
  <text x="725" y="456" font-size="12" font-weight="700" fill="#1a2e4a">Safran / Gouvernail</text>
  <text x="725" y="470" font-size="10" fill="#0d7377">+ barre à roue</text>

  <!-- Tirant d'eau -->
  <line x1="430" y1="490" x2="700" y2="530" stroke="#0d7377" stroke-width="1" opacity="0.6"/>
  <text x="705" y="526" font-size="12" font-weight="700" fill="#1a2e4a">Tirant d'eau</text>
  <text x="705" y="540" font-size="10" fill="#0d7377">profondeur minimale requise</text>
  <line x1="430" y1="428" x2="430" y2="495" stroke="#0d7377" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.6"/>
  <text x="435" y="460" font-size="10" fill="#0d7377">⟵</text>

  <!-- Tribord label -->
  <rect x="820" y="400" width="70" height="24" rx="4" fill="rgba(5,150,105,0.15)" stroke="#059669" stroke-width="1"/>
  <text x="855" y="416" text-anchor="middle" font-size="12" font-weight="700" fill="#059669">TRIBORD</text>
  <text x="855" y="434" text-anchor="middle" font-size="10" fill="#059669">côté droit (vert)</text>

  <!-- Direction arrow (avant/arrière) -->
  <line x1="260" y1="555" x2="570" y2="555" stroke="#1a2e4a" stroke-width="1.5"/>
  <text x="260" y="570" font-size="11" fill="#1a2e4a">◄ ARRIÈRE (Poupe)</text>
  <text x="570" y="570" text-anchor="end" font-size="11" fill="#1a2e4a">AVANT (Proue) ►</text>

  <!-- Footer -->
  <text x="450" y="605" text-anchor="middle" font-size="11" fill="#64748b" font-style="italic">Mémo : "Bâbord = Gauche = B comme Bière (rouge) · Tribord = Droite = T comme Vert"</text>
</svg>
