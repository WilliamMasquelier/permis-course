<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Vue du skipper la nuit — interpréter les feux des autres navires">
  <rect width="800" height="600" fill="#d4ecf7"/>
  <g font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">
    <text x="400" y="32" text-anchor="middle" fill="#1a2e4a" font-size="22" font-weight="700">Vue du skipper la nuit — que faire ?</text>
    <text x="400" y="55" text-anchor="middle" fill="#1a2e4a" font-size="13">Quatre situations classiques. Vous êtes l'observateur — le ciel est noir, vous voyez ces lumières.</text>

    <!-- Panel 1: Top-left — see RED + WHITE masthead -->
    <g transform="translate(40,80)">
      <rect width="350" height="220" rx="6" fill="#0a0e1a" stroke="#1a2e4a" stroke-width="2"/>
      <text x="175" y="22" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">① Feu rouge + feu blanc</text>
      <!-- Lights you see -->
      <circle cx="120" cy="100" r="8" fill="#ef4444"/>
      <circle cx="180" cy="80" r="6" fill="#fff"/>
      <text x="100" y="135" fill="#fff" font-size="11">Vous voyez :</text>
      <text x="100" y="150" fill="#ef4444" font-size="11" font-weight="700">• rouge (bâbord du navire)</text>
      <text x="100" y="165" fill="#fff" font-size="11">• tête de mât blanc</text>
      <!-- Verdict -->
      <rect x="20" y="180" width="310" height="32" rx="4" fill="#16a34a"/>
      <text x="175" y="201" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">Vous êtes prioritaire — il croise par tribord</text>
    </g>

    <!-- Panel 2: Top-right — see GREEN + WHITE masthead -->
    <g transform="translate(410,80)">
      <rect width="350" height="220" rx="6" fill="#0a0e1a" stroke="#1a2e4a" stroke-width="2"/>
      <text x="175" y="22" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">② Feu vert + feu blanc</text>
      <circle cx="180" cy="100" r="8" fill="#16a34a"/>
      <circle cx="120" cy="80" r="6" fill="#fff"/>
      <text x="100" y="135" fill="#fff" font-size="11">Vous voyez :</text>
      <text x="100" y="150" fill="#16a34a" font-size="11" font-weight="700">• vert (tribord du navire)</text>
      <text x="100" y="165" fill="#fff" font-size="11">• tête de mât blanc</text>
      <rect x="20" y="180" width="310" height="32" rx="4" fill="#ef4444"/>
      <text x="175" y="201" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">Vous cédez — il croise par bâbord</text>
    </g>

    <!-- Panel 3: Bottom-left — see RED + GREEN + WHITE = head-on motor -->
    <g transform="translate(40,320)">
      <rect width="350" height="220" rx="6" fill="#0a0e1a" stroke="#1a2e4a" stroke-width="2"/>
      <text x="175" y="22" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">③ Rouge + vert + blanc face à face</text>
      <circle cx="135" cy="100" r="8" fill="#ef4444"/>
      <circle cx="215" cy="100" r="8" fill="#16a34a"/>
      <circle cx="175" cy="75" r="6" fill="#fff"/>
      <text x="80" y="135" fill="#fff" font-size="11">Les deux feux de côté visibles</text>
      <text x="80" y="150" fill="#fff" font-size="11">+ tête de mât :</text>
      <text x="80" y="165" fill="#fff" font-size="11" font-weight="700">navire à moteur droit dessus</text>
      <rect x="20" y="180" width="310" height="32" rx="4" fill="#f59e0b"/>
      <text x="175" y="201" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">Tous deux abattent à tribord (Règle 14)</text>
    </g>

    <!-- Panel 4: Bottom-right — RED + GREEN no masthead = sailboat head-on -->
    <g transform="translate(410,320)">
      <rect width="350" height="220" rx="6" fill="#0a0e1a" stroke="#1a2e4a" stroke-width="2"/>
      <text x="175" y="22" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">④ Rouge + vert sans tête de mât</text>
      <circle cx="145" cy="100" r="8" fill="#ef4444"/>
      <circle cx="205" cy="100" r="8" fill="#16a34a"/>
      <text x="80" y="135" fill="#fff" font-size="11">Pas de feu blanc en hauteur :</text>
      <text x="80" y="150" fill="#fff" font-size="11" font-weight="700">voilier sous voiles, droit dessus</text>
      <text x="80" y="172" fill="#fff" font-size="10">(si vous êtes au moteur :</text>
      <text x="80" y="185" fill="#fff" font-size="10">vous cédez systématiquement)</text>
      <rect x="20" y="195" width="310" height="22" rx="4" fill="#ef4444"/>
      <text x="175" y="211" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">Règle 18 — moteur cède au voilier</text>
    </g>

    <!-- Bottom note -->
    <text x="400" y="575" text-anchor="middle" fill="#1a2e4a" font-size="12" font-style="italic">Mémo : « rouge à droite, je suis maître » — quand son rouge est à votre tribord, vous êtes le navire prioritaire.</text>
  </g>
</svg>
