<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" role="img" aria-label="Plan de navigation — approche de Butterfly Valley depuis Ölüdeniz">
  <defs>
    <marker id="ppArr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 Z" fill="#0d7377"/></marker>
  </defs>
  <rect width="800" height="560" fill="#d4ecf7"/>
  <g font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">
    <text x="400" y="32" text-anchor="middle" fill="#1a2e4a" font-size="22" font-weight="700">Plan de navigation — Ölüdeniz → Butterfly Valley</text>
    <text x="400" y="55" text-anchor="middle" fill="#1a2e4a" font-size="13">Trois waypoints, deux dangers, un alignement de sécurité</text>

    <!-- Coastline (simplified Lycian coast) -->
    <path d="M 50 480 Q 100 460 150 470 Q 200 485 240 460 Q 280 430 320 440 Q 370 460 410 430 Q 450 395 500 410 Q 540 425 590 400 Q 640 370 700 380 Q 740 388 760 400 L 760 540 L 50 540 Z"
          fill="#fef3c7" stroke="#a16207" stroke-width="2"/>
    <text x="120" y="515" fill="#a16207" font-size="11" font-weight="700">CÔTE LYCIENNE (falaises)</text>

    <!-- Cove inset: Butterfly Valley -->
    <path d="M 580 405 Q 600 440 620 460 Q 640 460 650 445 Q 660 425 645 415 Q 620 405 580 405 Z"
          fill="#bae6fd" stroke="#a16207" stroke-width="1.5"/>
    <text x="610" y="450" fill="#1a2e4a" font-size="11" font-weight="700">Butterfly</text>
    <text x="615" y="463" fill="#1a2e4a" font-size="11" font-weight="700">Valley</text>

    <!-- Departure: Ölüdeniz -->
    <circle cx="120" cy="200" r="8" fill="#1a2e4a"/>
    <text x="60" y="195" fill="#1a2e4a" font-size="12" font-weight="700">Départ</text>
    <text x="60" y="210" fill="#1a2e4a" font-size="11">Ölüdeniz</text>

    <!-- Waypoint 1: Open water, off Babadağ point -->
    <circle cx="280" cy="190" r="6" fill="#0d7377"/>
    <text x="290" y="185" fill="#0d7377" font-size="11" font-weight="700">WP1 — large</text>
    <text x="290" y="200" fill="#0d7377" font-size="10">36°31'N 29°06'E</text>

    <!-- Waypoint 2: Approach gate -->
    <circle cx="470" cy="280" r="6" fill="#0d7377"/>
    <text x="480" y="275" fill="#0d7377" font-size="11" font-weight="700">WP2 — porte d'approche</text>
    <text x="480" y="290" fill="#0d7377" font-size="10">à 0,8 NM au SW de la crique</text>

    <!-- Waypoint 3: Mouillage -->
    <circle cx="615" cy="430" r="6" fill="#0d7377"/>
    <text x="510" y="475" fill="#0d7377" font-size="11" font-weight="700">WP3 — mouillage cible</text>

    <!-- Route line -->
    <path d="M 120 200 L 280 190 L 470 280 L 615 430"
          fill="none" stroke="#0d7377" stroke-width="2.5" stroke-dasharray="8 4" marker-end="url(#ppArr)"/>

    <!-- Hazard 1: shoal at 1.4m -->
    <g>
      <circle cx="380" cy="320" r="22" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-dasharray="4 3"/>
      <text x="380" y="318" text-anchor="middle" fill="#ef4444" font-size="11" font-weight="700">Banc</text>
      <text x="380" y="332" text-anchor="middle" fill="#ef4444" font-size="10">1,4 m</text>
      <line x1="380" y1="298" x2="380" y2="180" stroke="#ef4444" stroke-width="1" stroke-dasharray="2 3"/>
      <text x="385" y="170" fill="#ef4444" font-size="10" font-style="italic">éviter — passer au nord</text>
    </g>

    <!-- Hazard 2: rocks near coast -->
    <g>
      <circle cx="540" cy="380" r="14" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-dasharray="4 3"/>
      <text x="540" y="383" text-anchor="middle" fill="#ef4444" font-size="10" font-weight="700">Roches</text>
    </g>

    <!-- Clearing bearing: from WP2 to a landmark, line that boat must stay above -->
    <line x1="470" y1="280" x2="700" y2="380" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="2 3"/>
    <text x="555" y="318" fill="#7c3aed" font-size="11" font-weight="700">Alignement de sécurité</text>
    <text x="555" y="332" fill="#7c3aed" font-size="10">cap 118° sur le pic visible</text>
    <text x="555" y="345" fill="#7c3aed" font-size="10">(rester au nord de cet axe)</text>

    <!-- Compass rose -->
    <g transform="translate(700,120)">
      <circle r="38" fill="#fff" stroke="#1a2e4a" stroke-width="1.5"/>
      <line x1="0" y1="-32" x2="0" y2="32" stroke="#1a2e4a"/>
      <line x1="-32" y1="0" x2="32" y2="0" stroke="#1a2e4a"/>
      <text y="-20" text-anchor="middle" fill="#1a2e4a" font-size="11" font-weight="700">N</text>
      <text y="32" text-anchor="middle" fill="#1a2e4a" font-size="11" font-weight="700">S</text>
      <text x="22" y="4" fill="#1a2e4a" font-size="11" font-weight="700">E</text>
      <text x="-22" y="4" fill="#1a2e4a" font-size="11" font-weight="700">O</text>
    </g>

    <!-- Scale -->
    <g transform="translate(60,90)">
      <line x1="0" y1="0" x2="100" y2="0" stroke="#1a2e4a" stroke-width="2"/>
      <line x1="0" y1="-4" x2="0" y2="4" stroke="#1a2e4a" stroke-width="2"/>
      <line x1="50" y1="-4" x2="50" y2="4" stroke="#1a2e4a" stroke-width="2"/>
      <line x1="100" y1="-4" x2="100" y2="4" stroke="#1a2e4a" stroke-width="2"/>
      <text x="50" y="22" text-anchor="middle" fill="#1a2e4a" font-size="11">1 NM</text>
    </g>

    <!-- Legend -->
    <g transform="translate(40,420)">
      <rect width="220" height="110" rx="6" fill="#fff" stroke="#1a2e4a" stroke-width="1" opacity="0.95"/>
      <text x="110" y="20" text-anchor="middle" fill="#1a2e4a" font-size="12" font-weight="700">Méthode SHOM en 4 points</text>
      <text x="12" y="42" fill="#1a2e4a" font-size="10">1. Tracer la route (waypoints)</text>
      <text x="12" y="58" fill="#ef4444" font-size="10">2. Cercler les dangers</text>
      <text x="12" y="74" fill="#7c3aed" font-size="10">3. Tracer un alignement de sécurité</text>
      <text x="12" y="90" fill="#1a2e4a" font-size="10">4. Noter caps, distances, ETA</text>
      <text x="12" y="103" fill="#666" font-size="9" font-style="italic">Refaire avant chaque sortie.</text>
    </g>
  </g>
</svg>
